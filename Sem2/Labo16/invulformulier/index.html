<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Persoonlijke informatie</legend>
            <label>Voornaam*: <input type="text" required autofocus placeholder="Your first name"></label> <br>
            <label>Familienaam*: <input type="text" placeholder="Your last name" required></label>
        </fieldset>
        <fieldset>
            <legend>Sport</legend>
            <p>Welk sport beoefen je</p>
            <input type="checkbox"><label>Lopen</label><br>
            <input type="checkbox"><label>Zwemmen</label><br>
            <input type="checkbox"><label>Roeien</label><br>
        </fieldset>
        <fieldset>
            <legend>Communicatievoorkeur</legend>
            <input type="radio"><label>Per post</label><br>
            <input type="radio"><label>E-mail</label><br>
        </fieldset>
        <fieldset>
            <legend>Favorieten</legend>
            <label>Favoriete film: </label><input type="text"><br>
            <label>Favoriete quote: </label><input type="text" placeholder="Geef je favoriete quote"><br>
            <select>
                <option value="1">Hamburger</option>
                <option value="2">Hot-dog</option>
                <option value="3">Pizza</option>
            </select><br>
            <label>Favoriete browser: </label><input type="text"><br>
        </fieldset>
        <fieldset>
            <legend>Beveiliging & contact</legend>
            <label>Wachtwoord*: <input type="password" required></label> <br>
            <label>E-mail: <input type="email" placeholder="geef je e-mailadres in"></label> <br>
            <label>Favoriete site: <input type="url" placeholder="Geef de URL van je favoriete site"></label>
        </fieldset>
        <fieldset>
            <legend>Extra informatie</legend>
            <label>Favoriete getal tussen 1-10: </label><input type="number"><br>
            <label>Favoriete getal tussen 11-100: </label><input type="range"><br>
            <label>Wanneer ben je geboren? : </label><input type="date"><br>
            <label>Belgische postcode* : </label>
            <input
                    type="text"
                    pattern="[0-9]{4}"
                    title="Postcode must be exactly 4 digits"
                    required
            >
        <br>
        </fieldset>
        <fieldset>
            <legend>Varia</legend>
            <label>Zoeken naar iets: <input type="text"></label> <br>
            <label>Wat is je lievelingskleur?: <input type="color"></label> <br>
            <button>Bestand Kiezen</button><label> Geen bestand gekozen</label>
        </fieldset>
        <button type="submit">Submit</button>
    </form>
    <form>
        <fieldset>
            <legend>Bonus</legend>
            <input
                    type="text"
                    pattern="(100[0-9]|10[1-9][0-9]|1[1-9][0-9]{2}|[2-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])"
                    maxlength="4"
                    minlength="4"
                    inputmode="numeric"
                    title="Voer een geldige Belgische postcode in (1000–9992)"
                    required
            >
        </fieldset>
        <button type="submit" >Submit</button>
    </form>
<script src="scripts/script.js"></script>
</body>
</html>
